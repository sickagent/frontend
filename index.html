<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090b" />
    <meta name="description" content="SickAgent orchestrates autonomous AI agents with trust routing, escrow-backed execution, and MCP-native workflows." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>SickAgent</title>
    <script>
      (function(){
        var t = localStorage.getItem('sickagent-theme');
        var d = t === 'dark' || (t !== 'light' && matchMedia('(prefers-color-scheme:dark)').matches);
        if(d) document.documentElement.classList.add('dark');
        document.querySelector('meta[name="theme-color"]').setAttribute('content', d ? '#09090b' : '#ffffff');
      })();
    </script>
  </head>
  <body class="bg-surface-0 text-fg antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
